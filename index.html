<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <!-- Set theme before first paint to avoid a light-mode flash. Mirrors
         getInitialTheme() in src/lib/theme.js: stored choice wins, else OS pref. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          if (t === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <meta
      name="description"
      content="Ishan Joshi — AI & Systems Engineer. Computer vision, self-supervised video learning, and production ML."
    />
    <title>Ishan Joshi · AI & Systems Engineer</title>

    <!-- Social sharing previews -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ishan Joshi · AI & Systems Engineer" />
    <meta
      property="og:description"
      content="Computer vision, self-supervised video learning, and production ML — from raw footage to insight."
    />
    <meta property="og:image" content="/ishan.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ishan Joshi · AI & Systems Engineer" />
    <meta
      name="twitter:description"
      content="Computer vision, self-supervised video learning, and production ML."
    />
    <meta name="twitter:image" content="/ishan.jpg" />

    <!-- Distinctive type: Bricolage Grotesque (display) + Hanken Grotesk (body). No Inter/Roboto. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:ital,wght@0,300..800;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>

  </body>
</html>
